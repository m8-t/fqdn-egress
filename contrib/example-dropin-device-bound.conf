# Systemd-native start for forward mode on an orchestrator-created
# interface: bind the service to the device unit so it starts when the
# interface appears and stops when it vanishes. Alternative to having the
# orchestrator script call systemctl start/stop itself.
#
# Install as a drop-in:
#   systemctl edit fqdn-egress        # paste this file
# or
#   install -Dm644 example-dropin-device-bound.conf \
#     /etc/systemd/system/fqdn-egress.service.d/device-bound.conf
#   systemctl daemon-reload
# then
#   systemctl enable fqdn-egress      # WantedBy below hooks the device
#
# Interface names containing dashes must be escaped in the device unit
# name (tap-claude -> tap\x2dclaude). Generate with:
#   systemd-escape --suffix=device tap-claude

[Unit]
BindsTo=sys-subsystem-net-devices-tap0.device
After=sys-subsystem-net-devices-tap0.device

[Install]
WantedBy=sys-subsystem-net-devices-tap0.device
